<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo con gradiente azul oscuro -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a6fa8"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fa8"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dde6f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Fondo redondo -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Puntos decorativos de fondo -->
  <circle cx="80" cy="80" r="6" fill="rgba(255,255,255,0.06)"/>
  <circle cx="160" cy="60" r="4" fill="rgba(255,255,255,0.06)"/>
  <circle cx="432" cy="432" r="6" fill="rgba(255,255,255,0.06)"/>
  <circle cx="350" cy="450" r="4" fill="rgba(255,255,255,0.06)"/>

  <!-- Ficha dominó izquierda (inclinada) -->
  <g transform="translate(120, 200) rotate(-12)">
    <rect x="0" y="0" width="110" height="190" rx="16" fill="url(#card1)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="110" height="190" rx="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <!-- Línea divisora -->
    <line x1="10" y1="95" x2="100" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Puntos arriba: 3 -->
    <circle cx="35" cy="40" r="9" fill="white" opacity="0.9"/>
    <circle cx="55" cy="65" r="9" fill="white" opacity="0.9"/>
    <circle cx="75" cy="40" r="9" fill="white" opacity="0.9"/>
    <!-- Puntos abajo: 2 -->
    <circle cx="35" cy="125" r="9" fill="white" opacity="0.9"/>
    <circle cx="75" cy="155" r="9" fill="white" opacity="0.9"/>
  </g>

  <!-- Ficha dominó derecha (inclinada otro lado) -->
  <g transform="translate(282, 122) rotate(12)">
    <rect x="0" y="0" width="110" height="190" rx="16" fill="url(#card2)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="110" height="190" rx="16" fill="none" stroke="rgba(15,52,96,0.15)" stroke-width="2"/>
    <!-- Línea divisora -->
    <line x1="10" y1="95" x2="100" y2="95" stroke="rgba(15,52,96,0.2)" stroke-width="2"/>
    <!-- Puntos arriba: 4 -->
    <circle cx="32" cy="35" r="9" fill="#e94560" opacity="0.9"/>
    <circle cx="78" cy="35" r="9" fill="#e94560" opacity="0.9"/>
    <circle cx="32" cy="75" r="9" fill="#e94560" opacity="0.9"/>
    <circle cx="78" cy="75" r="9" fill="#e94560" opacity="0.9"/>
    <!-- Puntos abajo: 1 -->
    <circle cx="55" cy="140" r="9" fill="#0f3460" opacity="0.9"/>
  </g>

  <!-- Estrella dorada (lider) -->
  <text x="256" y="430" text-anchor="middle" font-size="48" fill="#f5a623" opacity="0.9">★</text>

  <!-- Texto "200" score hint -->
  <text x="256" y="478" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="rgba(255,255,255,0.4)" letter-spacing="4">DOMINÓ</text>
</svg>
